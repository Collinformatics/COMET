<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="../static/styles.css">
        <script src="../static/app.js"></script>
        <title>COMET</title>
    </head>
    <body>
        <!-- Header -->
        <div>
            <h1>COmprehensive Motif Evaluation Toolkit</h1>
        </div>
        <div>
            <!-- Header Buttons -->
            <div class="container-header">
                <div class="button-group">
                    <button class="buttonHeader" onclick="pageHome()">Home</button>
                    <button class="buttonHeader" onclick="pageProcessDNA()">Process DNA</button>
                    <button class="buttonHeader" onclick="pageFilterAA()">Filter AA</button>
                    <button class="buttonHeader" onclick="pageFilterMotif()">Filter Motif</button>
                    <button class="buttonHeader" onclick="pageCombineProfiles()">Combine Profiles</button>
                </div>
                <div class="button-group-r">
                    <button class="buttonHeader" onclick="pageResources()">Resources</button>
                </div>
            </div>
        </div>

        <!-- Application -->
        <div class="box">
            <h2>Combine Substrate Profiles</h2>
            <p>
                Combine enzyme profiles.
            </p>

            <!-- Forms -->
            <div class="box-form">
                <form id="filterSubs" enctype="multipart/form-data" class="input-form" method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                    <!-- Enzyme name -->
                    <div class="form-group">
                        <label for="enzymeName">Enzyme Name:</label>
                        <div class="form-wrapper">
                            <input type="text" id="enzymeName" name="enzymeName" required value="Name">
                        </div>
                    </div>

                    <!-- Profiles -->
                    <div class="form-group">
                        <div class="help">
                            <label for="nProfiles">Number of Profiles:</label>
                            <div class="help-icon">?
                                <span class="help-tooltip">
                                    Combine N number of profiles.
                                </span>
                            </div>
                        </div>
                        <div class="form-wrapper">
                            <input type="number" id="nProfiles" name="nProfiles"
                               value="2" min="2" style="width: 60px;"
                               onchange="updateNumProfiles()"
                               required>
                        </div>
                    </div>
                    <div class="form-group">        <!-- same parent as static inputs -->
                        <div id="profileContainer"></div>
                    </div>

                    <!-- Background dataset -->
                    <div class="form-group">
                        <div class="help">
                            <label>Background Data:</label>
                            <div class="help-icon">?
                                <span class="help-tooltip">
                                    Background count matrix.<br>
                                    Acceptable file extension: .csv
                                </span>
                            </div>
                        </div>
                        <div class="form-wrapper">
                            <label class="label-sub" for="fileBg">Counts:</label>
                            <input type="file" id="fileBg" name="fileBg"
                                   accept=".csv"
                                   value="data/variantsBg.fastq"
                                   multiple>
                        </div>
                    </div>

                    <!-- Sequence Length -->
                    <div class="form-group">
                        <div class="help">
                            <label for="seqLength">Sequence Length:</label>
                            <div class="help-icon">?
                                <span class="help-tooltip">
                                    Number of AAs in the substrate.
                                </span>
                            </div>
                        </div>
                        <div class="form-wrapper">
                            <input type="number" id="seqLength" name="seqLength"
                               value="8" min="1" style="width: 60px;"
                               onchange="updateFixedAA()"
                               required>
                        </div>
                    </div>

                    <!-- Motif Length -->
                    <div class="form-group">
                        <div class="help">
                            <label for="motifLength">Motif Length:</label>
                            <div class="help-icon">?
                                <span class="help-tooltip">
                                    Number of AAs in the motif.
                                </span>
                            </div>
                        </div>
                        <div class="form-wrapper">
                            <input type="number" id="motifLength" name="motifLength"
                                   value="6" min="1" style="width: 60px;"
                                   onchange="updateNumProfiles()"
                                   required>
                        </div>
                    </div>

                    <!-- Execute -->
                    <div class="button-wrapper">
                        <button class="button" onclick="buttonFilterSubs('motif')">Evaluate</button>
                    </div>
                </form>
            </div>
        </div>
        <div class=ft>
            <span>Version 1.0.0 (2026)</span>
            <a href="https://brent.iverson.cm.utexas.edu/">
                <button class="btn">Iverson Lab</button>
            </a>
        </div>
    </body>
</html>
